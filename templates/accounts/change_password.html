{% extends "base/base.html" %}

{% block content %}

<style>
.btn-custom-purple {
    background: #700143;
    border: 1px solid #700143;
    color: white;
    transition: 0.3s;
}

.btn-custom-purple:hover {
    background: #fcd7dd;
    border: 1px solid #fcd7dd;
    color: #700143;
    font-weight: 500;
}
</style>

<div class="container mt-5">

    <div class="row">

        <!-- LEFT -->
        <div class="col-md-3">
            <div class="card p-3 shadow-sm">
                <ul class="list-unstyled">
                    <li><strong>Mon compte</strong></li>
                    <hr>

                    <li class="mb-2">
                        <a href="{% url 'accounts:emprunts' %}" class="text-decoration-none text-dark">
                            Mes emprunts
                        </a>
                    </li>

                    <li class="mb-2">
                        <a href="{% url 'accounts:penalites' %}" class="text-decoration-none text-dark">
                            Mes penalites
                        </a>
                    </li>

                    <li class="mb-2">
                        <a href="{% url 'accounts:my_information' %}" class="text-decoration-none text-dark">
                            Mes informations
                        </a>
                    </li>

                    <hr>

                    <li class="mb-2">
                        <a href="{% url 'accounts:logout' %}" style="color:black;">
                            Déconnexion
                        </a>
                    </li>
                </ul>
            </div>
        </div>

        <!-- RIGHT -->
        <div class="col-md-9">

            <div class="card shadow-sm p-4">

                <h3 class="mb-4">Modifier le mot de passe</h3>
                {% if messages %}
    {% for message in messages %}
        <div class="alert 
            {% if message.tags == 'error' %}alert-danger{% endif %}
            {% if message.tags == 'success' %}alert-success{% endif %}"
            role="alert">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

                <form method="post">
                    {% csrf_token %}

                    <!-- OLD PASSWORD -->
                    <div class="mb-3">
                        <label>Ancien mot de passe</label>

                        <div style="position: relative;">
                            <input type="password" id="old_password" name="old_password" class="form-control" required>

                            <span onclick="toggleOldPassword()"
                                  style="position:absolute; right:10px; top:10px; cursor:pointer; color:#700143;">
                                <i class="bi bi-eye"></i>
                            </span>
                        </div>
                    </div>

                    <!-- NEW PASSWORD -->
                    <div class="mb-3">
                        <label>Nouveau mot de passe</label>

                        <div style="position: relative;">
                            <input type="password" id="new_password" name="new_password" class="form-control" required>

                            <span onclick="toggleNewPassword()"
                                  style="position:absolute; right:10px; top:10px; cursor:pointer; color:#700143;">
                                <i class="bi bi-eye"></i>
                            </span>
                        </div>

                        <small id="strengthText"></small>
                    </div>

                    <!-- CONFIRM PASSWORD -->
                    <div class="mb-3">
                        <label>Confirmer le mot de passe</label>

                        <div style="position: relative;">
                            <input type="password" id="new_password2" name="new_password2" class="form-control" required>

                            <span onclick="toggleConfirmPassword()"
                                  style="position:absolute; right:10px; top:10px; cursor:pointer; color:#700143;">
                                <i class="bi bi-eye"></i>
                            </span>
                        </div>

                        <small id="confirmHelp" class="d-block"></small>
                    </div>

                    <!-- BUTTONS -->
                    <div class="d-flex justify-content-between mt-3">

                        <a href="{% url 'accounts:my_information' %}" style="color:#700143;">
                            Retour
                        </a>

                        <button type="submit" class="btn btn-custom-purple">
                            Enregistrer
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

<!-- SCRIPT -->
<script>
const passwordInput = document.getElementById("new_password");
const password2Input = document.getElementById("new_password2");

const help = document.getElementById("strengthText");
const confirmHelp = document.getElementById("confirmHelp");
const oldPasswordInput = document.getElementById("old_password");

let passwordWasValid = false;
let lastStrength = "";
let timeoutId;

/* TOGGLES */
function toggleOldPassword() {
    oldPasswordInput.type =
        oldPasswordInput.type === "password" ? "text" : "password";
}

function toggleNewPassword() {
    passwordInput.type =
        passwordInput.type === "password" ? "text" : "password";
}

function toggleConfirmPassword() {
    password2Input.type =
        password2Input.type === "password" ? "text" : "password";
}

/* PASSWORD CHECK */
passwordInput.addEventListener("input", function () {
    const password = passwordInput.value;
    let score = 0;

    if (password.length >= 8) score++;
    if (/[A-Z]/.test(password)) score++;
    if (/[a-z]/.test(password)) score++;
    if (/[0-9]/.test(password)) score++;
    if (/[!@#$%^&*(),.?\":{}|<>_]/.test(password)) score++;

    if (password.length === 0) {
        help.innerHTML = "";
        return;
    }

    let strength = "";
    let color = "";

    if (score <= 2) {
        strength = "Faible";
        color = "#c0392b";

        help.innerHTML =
            "Le mot de passe doit contenir au moins 8 caractères, une majuscule, une minuscule, un chiffre et un caractère spécial."
            + "<br> Sécurité : " + strength;
    } 
    else if (score <= 4) {
        strength = "Moyenne";
        color = "#e67e22";

        help.innerHTML =
            "Le mot de passe doit contenir au moins 8 caractères, une majuscule, une minuscule, un chiffre et un caractère spécial."
            + "<br> Sécurité : " + strength;
    } 
    else {
        // 🔥 ONLY SHOW "FORTE"
        strength = "Forte";
        help.innerHTML = "Sécurité : " + strength;
        color = "#27ae60";
        
        // disparaît après 2 secondes
        setTimeout(() => {
            strengthText.innerHTML = "";
        }, 2000);
    }

    help.style.color = color;

    checkMatch();
});
/* CONFIRM PASSWORD */
password2Input.addEventListener("input", checkMatch);

function checkMatch() {
    if (password2Input.value === "") {
        confirmHelp.innerHTML = "";
        return;
    }

    if (passwordInput.value !== password2Input.value) {
        confirmHelp.innerHTML = "Les mots de passe ne correspondent pas";
        confirmHelp.style.color = "#c0392b";
    } else {
        confirmHelp.innerHTML = "Les mots de passe correspondent";
        confirmHelp.style.color = "#27ae60";
    }
}

/* BLOCK SUBMIT */
document.querySelector("form").addEventListener("submit", function(e) {
    if (passwordInput.value !== password2Input.value) {
        e.preventDefault();
        confirmHelp.innerHTML = "Les mots de passe ne correspondent pas";
        confirmHelp.style.color = "#c0392b";
    }
});
</script>
{% endblock %}
